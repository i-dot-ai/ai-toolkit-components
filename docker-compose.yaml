services:
  vector_db:
    build:
      context: ./components/vector_db
      dockerfile: Dockerfile
    image: vector_db:latest
    restart: unless-stopped
    ports:
      - "${VECTOR_DB_HTTP_PORT:-6333}:${VECTOR_DB_HTTP_PORT:-6333}"
      - "${VECTOR_DB_GRPC_PORT:-6334}:${VECTOR_DB_GRPC_PORT:-6334}"
    volumes:
      - ./data/vector_db:/qdrant/storage
    environment:
      - VECTOR_DB_BIND_HOST=${VECTOR_DB_BIND_HOST:-0.0.0.0}
      - VECTOR_DB_HTTP_PORT=${VECTOR_DB_HTTP_PORT:-6333}
      - VECTOR_DB_GRPC_PORT=${VECTOR_DB_GRPC_PORT:-6334}

  data_ingestor:
    build:
      context: ./components/data_ingestor
      dockerfile: Dockerfile
    image: data_ingestor:latest
    depends_on:
      - vector_db
    restart: unless-stopped
    environment:
      - VECTOR_DB_HOST=vector_db
      - VECTOR_DB_PORT=${VECTOR_DB_HTTP_PORT:-6333}

  mcp_server:
    build:
      context: ./components/mcp_server
      dockerfile: Dockerfile
    image: mcp_server:latest
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8080}:${MCP_SERVER_PORT:-8080}"
    depends_on:
      - vector_db
    environment:
      - MCP_SERVER_HOST=${MCP_SERVER_HOST:-0.0.0.0}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-8080}
      - VECTOR_DB_HOST=vector_db
      - VECTOR_DB_PORT=${VECTOR_DB_HTTP_PORT:-6333}

  vector_query:
    build:
      context: ./components/vector_query
      dockerfile: Dockerfile
    image: vector_query:latest
    depends_on:
      - vector_db
    restart: unless-stopped
    environment:
      - VECTOR_DB_HOST=vector_db
      - VECTOR_DB_PORT=${VECTOR_DB_HTTP_PORT:-6333}
